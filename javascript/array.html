<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>배열</title>
</head>
<body>
    <h2>배열 Array</h2>

    <script>
        // 변수 선언
        let season = "여름";
        
        console.log("계절 : " , season);
        console.log(typeof(season));        // string
        

        // 배열1.
        // 여러개, 변수를 하나로 묶음
        // 배열의 선언과 초기화
        let seasons = ["봄", "여름", "가을", "겨울"]

        console.log("계절 : " , seasons);
        console.log(typeof(seasons));        // object (객체)
        
        // element (요소)에 접근,조회  ,  인덱스 순서대로 접근한다
        // 배열은 0번 부터 시작
        console.log(seasons[0]);        // 봄
        console.log(seasons[2]);        // 가을
        
        // 배열 2.
        let numbers = new Array(4);
        console.log(numbers.length);    // 배열의 크기 : 4

        // 요소(값) 저장
        numbers[0] = 10;
        numbers[1] = 20;
        numbers[2] = 30;
        numbers[3] = 40;

        console.log(numbers);
        
        
        
        
    </script>
    
</body>
</html>
