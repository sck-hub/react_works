<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>다중 조건문</title>
    <style>
        .display {
            margin-bottom: 10px;
            font-size: 20px;
            font-weight: bold;
        }
        button {
            padding: 5px 10px;

        }
    </style>
</head>
<body>
    <h2>신호등 프로그램</h2>
    <div id="result" class="display"></div>
        <!-- onClick의 선언한 함수(checkColor)를 호출 -->
        <button onclick="checkColor()">판별하기</button>

    <script>
        // DOM(Document Of Model) : document 객체 사용
        // checkColor 함수
        function checkColor() {
            // let color = "red"
            // prompt("입력할 내용") 함수
            let color = prompt("색상을 입력하세요(Red, Green, Yellow)")

            // div의 id result를 getelementbyid로 갖고오겠다
            const result = document.getElementById("result")

            // 취소 버튼 클릭했을 때
            if(color == null) {
                result.innerText = "입력이 취소되었습니다.";
                result.style.color="red";
            } else {    // 정상으로 실행된 경우

            if(color == "red") {
                result.innerText = "멈춤"
                // console.log("멈춤");
                
            } else if(color == "yellow") {
                result.innerText = "준비"
                // console.log("준비");
                
            } else if(color == "green") {
                result.innerText = "진행"
                // console.log("진행");
                
            } else {
                // console.log("알 수 없음");
                result.innerHTML = "알 수 없음 <br> (red, yellow, green 하나를 입력하세요)"
                
            }

            }


            
        }





    </script>
    
</body>
</html>
