     // 키보드 입력
    while(true) {
        // prompt("데이터", 힌트)
        let key = prompt("계속할까요?", 'y/n');
        // 키가 소문자y 또는 대문자Y일 경우
        if (key == 'y' || key == 'Y') {
            alert('반복합니다.');
            
        } else if (key == 'n' || key == 'N') {
            alert('중단합니다.');
            // break 반복 중단
            break;
        } else {
            alert('잘못된 입력입니다.');
        }
    }       
    console.log("프로그램 종료");
    
    </script>
